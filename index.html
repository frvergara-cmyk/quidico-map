<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CECOSF Quidico</title>

<link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  #map {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* HEADER */
  .app-header {
    position: fixed;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    background: linear-gradient(135deg, rgba(10,60,50,.90), rgba(24,95,79,.82));
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.08);
    z-index: 1000;
  }

  /* LOGO */
  .logo-wrapper {
    width: 72px;
    height: 72px;
    min-width: 72px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    box-shadow: 0 6px 15px rgba(0,0,0,.15);
  }

  .logo-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* CONTENIDO */
  .header-content {
    flex: 1;
  }

  .header-content h1 {
    color: white;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .subtitle {
    margin-top: 6px;
    color: rgba(255,255,255,0.88);
    font-size: 16px;
    font-weight: 500;
  }

  .status {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    font-weight: 500;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    background: #4ADE80;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(74,222,128,.7);
  }

  /* BOTÓN MENÚ */
  .menu-btn {
    width: 52px;
    height: 52px;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    transition: .25s ease;
  }

  .menu-btn:hover {
    background: rgba(255,255,255,0.22);
  }

  /* MÓVIL */
  @media(max-width:768px) {
    .app-header {
      padding: 12px;
      gap: 12px;
    }
    .logo-wrapper {
      width: 58px;
      height: 58px;
      min-width: 58px;
    }
    .header-content h1 {
      font-size: 22px;
    }
    .subtitle {
      font-size: 14px;
    }
    .status {
      font-size: 12px;
    }
    .menu-btn {
      width: 46px;
      height: 46px;
    }
  }
</style>
</head>
<body>

<div id="map"></div>

<header class="app-header">
  <div class="logo-wrapper">
    <img src="logo.png" alt="CECOSF Quidico Logo">
  </div>
  <div class="header-content">
    <h1>CECOSF Quidico</h1>
    <p class="subtitle">Mapa de activos comunitarios</p>
    <div class="status">
      <span class="status-dot"></span>
      Activos comunitarios disponibles
    </div>
  </div>
  <button class="menu-btn">☰</button>
</header>

<script>
mapboxgl.accessToken = "pk.eyJ1IjoiY2FuaW5vMTIzIiwiYSI6ImNtcmgwcnl5MTFmYzIyeG9pMmlsOTYxN2UifQ.i0uVBYe1GJ0MlzvIuAZGzw";

const CATEGORIAS = {
  naturaleza:  { label: "Naturaleza",   color: "#22c55e" },
  gastronomia: { label: "Gastronomía",  color: "#f97316" },
  pesca:       { label: "Pesca",        color: "#3b82f6" },
  artesania:   { label: "Artesanía",    color: "#6b7280" },
  alojamiento: { label: "Alojamiento",  color: "#a21caf" },
  espiritualidad: { label: "Espiritualidad", color: "#8b5cf6" },
  instituciones: { label: "Instituciones", color: "#ef4444" }
};

const map = new mapboxgl.Map({
  container: "map",
  style: "mapbox://styles/mapbox/satellite-streets-v12",
  center: [-73.48618488576602, -38.24882083731832],
  zoom: 15
});

map.addControl(new mapboxgl.NavigationControl(), "top-right");

let activas = [];
let todosLosLugares = [];
const markerRefs = [];

function toggleFiltro(id) {
  activas = activas.includes(id)
    ? activas.filter(x => x !== id)
    : [...activas, id];
  aplicarFiltros();
  actualizarUI();
}

function aplicarFiltros() {
  markerRefs.forEach(ref => {
    const categoria = ref.feature.properties.category;
    const visible = activas.length === 0 || activas.includes(categoria);
    const markerEl = ref.marker.getElement();
    markerEl.style.display = visible ? "" : "none";
  });
}

function actualizarUI() {
  const botones = document.querySelectorAll('.filtro-btn');
  botones.forEach(btn => {
    const id = btn.dataset.cat;
    btn.classList.toggle('activa', activas.includes(id));
  });
}

function crearRail() {
  const rail = document.getElementById('filtroRail');
  Object.entries(CATEGORIAS).forEach(([id, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'filtro-btn';
    btn.dataset.cat = id;
    btn.innerHTML = `
      <span class="filtro-dot" style="background:${cat.color}"></span>
      <span class="filtro-label">${cat.label}</span>
    `;
    btn.addEventListener('click', () => toggleFiltro(id));
    rail.appendChild(btn);
  });
}

function mostrarPopup(feature, coords) {
  const cat = CATEGORIAS[feature.properties.category] || { label: 'Punto', color: '#888' };
  const photoHTML = feature.properties.photo ? `<img src="${feature.properties.photo}" class="popup-img" alt="">` : '';

  new mapboxgl.Popup({ offset: 24 })
    .setLngLat(coords)
    .setHTML(`
      ${photoHTML}
      <span class="popup-cat" style="background:${cat.color}">${cat.label}</span>
      <h3 class="popup-title">${feature.properties.name}</h3>
      <p class="popup-desc">${feature.properties.description || ""}</p>
    `)
    .addTo(map);
}

function cargarDatos() {
  fetch("quidico-data.geojson")
    .then(res => res.json())
    .then(data => {
      todosLosLugares = data.features;

      data.features.forEach(feature => {
        const cat = CATEGORIAS[feature.properties.category] || { label: feature.properties.category, color: "#888" };
        const coords = feature.geometry.coordinates;

        const marker = new mapboxgl.Marker({ color: cat.color })
          .setLngLat(coords)
          .addTo(map);

        marker.getElement().addEventListener('click', () => mostrarPopup(feature, coords));
        markerRefs.push({ feature, marker });
      });

      crearRail();
    })
    .catch(err => console.error('Error cargando datos:', err));
}

map.on("load", cargarDatos);
</script>

</body>
</html>
